services:
  drupal:
    image: ${APP_IMAGE}:${APP_IMAGE_TAG}
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DRUPAL_DB_NAME: ${DRUPAL_DB_NAME}
      DRUPAL_DB_USER: ${DRUPAL_DB_USER}
      DRUPAL_DB_PASSWORD: ${DRUPAL_DB_PASSWORD}
      DRUPAL_DB_HOST: ${DRUPAL_DB_HOST}
      DRUPAL_DB_PORT: ${DRUPAL_DB_PORT}
      DRUPAL_HASH_SALT: ${DRUPAL_HASH_SALT}
      DRUPAL_ERROR_LEVEL: ${DRUPAL_ERROR_LEVEL}
      DRUPAL_TWIG_DEBUG: ${DRUPAL_TWIG_DEBUG}
      DRUPAL_TRUSTED_HOST: ${DRUPAL_TRUSTED_HOST}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portfolio.rule=Host(`${TRAEFIK_DOMAIN}`)"
      - "traefik.http.routers.portfolio.entrypoints=websecure"
      - "traefik.http.routers.portfolio.tls=true"
      - "traefik.http.routers.portfolio.tls.certresolver=letsencrypt"
      - "traefik.http.services.portfolio.loadbalancer.server.port=80"
      - "traefik.docker.network=${TRAEFIK_NETWORK}"
    volumes:
      - drupal_files:/var/www/html/web/sites/default/files
    networks:
      - web
      - internal

  db:
    image: mysql:8
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - internal

volumes:
  db_data:
  drupal_files:

networks:
  web:
    external: true
    name: ${TRAEFIK_NETWORK}
  internal:
